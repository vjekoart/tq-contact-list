<app-contact-form
  [name]="contact.name"
  [email="contact.email"
  [numbers]="contact.numbers"
  [image]="contact.image"
  [hasBack]="true"
  [hasCancel]="true"
  [hasDelete]="true"
  [hasEdit]="false"
  [hasFavorite]="false"
  [hasSave]="true"
  (onBack)="location.back()"
  (onCancel)="location.back()"
  (onDelete)="action.deleteContact(contact.id)"
  (onSave)="action.updateContact(contact.id, $event)"></app-contact-form>
