<app-contact-form
  [name]="contact.name"
  [email]="contact.email"
  [numbers]="contact.numbers"
  [image]="contact.image"
  [favorited]="contact.favorited"
  [hasBack]="true"
  [hasCancel]="false"
  [hasDelete]="false"
  [hasEdit]="true"
  [hasFavorite]="true"
  [hasSave]="false"
  [readonly]="true"
  (onBack)="location.back()"
  (onEdit)="router.navigate(['edit', contact.id])"
  (onFavorite)="action.updateContact(contact.id, { favorited: !contact.favorited })"></app-contact-form>
