<app-loading-message *ngIf="!contact">Loading contact...</app-loading-message>
<app-contact-form
  *ngIf="contact"
  [name]="contact.name"
  [email]="contact.email"
  [numbers]="contact.numbers"
  [image]="contact.image"
  [hasBack]="true"
  [hasCancel]="true"
  [hasDelete]="true"
  [hasSave]="true"
  (backAction)="location.back()"
  (cancelAction)="location.back()"
  (deleteAction)="action.deleteContact(contact.id)"
  (saveAction)="action.updateContact(contact.id, $event)"></app-contact-form>
